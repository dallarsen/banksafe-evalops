name: Live eval (Anthropic API)

# This workflow runs the FULL evaluation against the real Anthropic API.
# It costs roughly $1-3 per run and takes ~10 minutes. It is therefore
# triggered only on:
#   - Manual dispatch (Actions tab → "Run workflow")
#   - PRs labeled with `run-eval`
#
# Required secrets:
#   ANTHROPIC_API_KEY  — the API key the eval will use

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Limit to N cases (leave blank for full run)"
        required: false
        default: ""
  pull_request:
    types: [labeled]

jobs:
  live-eval:
    name: Run live eval and check for regressions
    # Only run if manually dispatched OR the PR was labeled `run-eval`.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       github.event.label.name == 'run-eval')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Calibrate judges
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          banksafe eval calibrate || echo "::warning::Calibration flagged a dimension; continuing."

      - name: Run evaluation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          mkdir -p evals/output
          if [ -n "${{ inputs.limit }}" ]; then
            banksafe eval run --limit ${{ inputs.limit }} --output evals/output/last_run.json || true
          else
            banksafe eval run --output evals/output/last_run.json || true
          fi

      - name: Compare against baseline
        id: compare
        run: |
          mkdir -p evals/output
          banksafe eval compare \
            --current evals/output/last_run.json \
            --baseline evals/baseline/main-baseline.json \
            --pr-comment evals/output/pr-comment.md
          echo "compare_exit=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Upload run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: |
            evals/output/last_run.json
            evals/output/pr-comment.md
          retention-days: 30

      - name: Post PR comment with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'evals/output/pr-comment.md';
            if (!fs.existsSync(path)) {
              core.warning('No PR comment file found; skipping.');
              return;
            }
            const body = fs.readFileSync(path, 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });

      - name: Fail the job if regressions were detected
        run: |
          if [ "${{ steps.compare.outputs.compare_exit }}" = "1" ]; then
            echo "::error::Regression detected — failing the job to block merge."
            exit 1
          fi
