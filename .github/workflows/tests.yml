name: Tests & fast checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Unit tests + regression-engine smoke check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/ -v

      - name: Smoke-test the regression-comparison engine
        # Compares the committed baseline against itself — must always pass
        # with zero deltas. Verifies the comparison engine and CLI plumbing
        # work without spending API credit.
        run: |
          mkdir -p evals/output
          cp evals/baseline/main-baseline.json evals/output/last_run.json
          banksafe eval compare \
            --current evals/output/last_run.json \
            --baseline evals/baseline/main-baseline.json
